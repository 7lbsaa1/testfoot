<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7lbsaa كورة - تسجيل الدخول</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body {
            background: linear-gradient(rgba(10, 17, 24, 0.75), rgba(10, 17, 24, 0.85)), url('back.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container { width: 100%; max-width: 440px; display: flex; flex-direction: column; align-items: center; }
        .logo-section { text-align: center; margin-bottom: 25px; }
        .logo-section .main-logo { width: 120px; height: auto; margin-bottom: 10px; }
        .logo-section .ball-gif { width: 45px; height: 45px; display: block; margin: 0 auto 10px auto; }
        .logo-section h1 { color: #ffffff; font-size: 28px; font-weight: 800; }
        .logo-section h1 span { color: #4CAF50; }
        .logo-section p { color: #a0aec0; font-size: 13px; }
        .glass-card {
            background: rgba(15, 23, 33, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            width: 100%;
            padding: 35px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        .card-title { color: #ffffff; font-size: 24px; font-weight: 700; margin-bottom: 8px; text-align: center; }
        .card-subtitle { color: #a0aec0; font-size: 13px; margin-bottom: 30px; text-align: center; }
        .input-group { margin-bottom: 20px; text-align: right; }
        .input-group label { display: block; color: #cbd5e0; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper input {
            width: 100%; background: rgba(10, 15, 22, 0.6); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px; padding: 12px 14px 12px 42px; color: #ffffff; font-size: 14px; outline: none; text-align: right;
        }
        .input-wrapper input:focus { border-color: #4CAF50; box-shadow: 0 0 10px rgba(76, 175, 80, 0.15); }
        .input-icon-right { position: absolute; left: 15px; color: #4a5568; font-size: 16px; }
        .password-toggle { position: absolute; right: 15px; color: #4a5568; font-size: 14px; cursor: pointer; }
        .forgot-pass { display: block; text-align: right; color: #4CAF50; font-size: 12px; margin-top: -12px; margin-bottom: 24px; font-weight: 600; }
        .btn-submit {
            width: 100%; background: #4CAF50; color: #ffffff; border: none; border-radius: 8px; padding: 12px;
            font-size: 16px; font-weight: 700; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3); transition: all 0.3s;
        }
        .btn-submit:hover { background: #43a047; transform: translateY(-1px); }
        .card-footer { margin-top: 25px; color: #cbd5e0; font-size: 13px; text-align: center; }
        .card-footer a { color: #4CAF50; font-weight: 700; margin-right: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-section">
            <img src="7lbsaa7.png" alt="7lbsaa Logo" class="main-logo">
            <img src="football-soccer.gif" alt="Football Animated" class="ball-gif">
            <h1>7lbsaa <span>كورة</span></h1>
            <p>عيش شغف كرة القدم</p>
        </div>

        <div class="glass-card">
            <h2 class="card-title">تسجيل الدخول</h2>
            <p class="card-subtitle">مرحباً بعودتك! سجل دخولك للمتابعة</p>

            <form>
                <div class="input-group">
                    <label>البريد الإلكتروني</label>
                    <div class="input-wrapper">
                        <input type="email" id="loginEmail" placeholder="أدخل بريدك الإلكتروني" required>
                        <i class="fa-regular fa-envelope input-icon-right"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label>كلمة المرور</label>
                    <div class="input-wrapper">
                        <input type="password" placeholder="أدخل كلمة المرور" id="loginPassword" required>
                        <i class="fa-regular fa-eye-slash password-toggle" onclick="togglePassword()"></i>
                        <i class="fa-solid fa-lock input-icon-right"></i>
                    </div>
                </div>

                <a href="#" class="forgot-pass">نسيت كلمة المرور؟</a>

                <button type="submit" class="btn-submit">
                    تسجيل الدخول
                    <i class="fa-solid fa-arrow-right-to-bracket" style="transform: rotate(180deg);"></i>
                </button>
            </form>

            <div class="card-footer">
                ليس لديك حساب؟ <a href="register.html">إنشاء حساب جديد</a>
            </div>
        </div>
</div> <script type="module">
        // التعديل الصحيح: استدعاء الأدوات الصريحة والإشارة للملف الجديد v2
        import { auth, signInWithEmailAndPassword } from "./firebase-config-v2.js";
        
        window.togglePassword = function() {
            const passwordInput = document.getElementById('loginPassword');
            const toggleIcon = document.querySelector('.password-toggle');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.replace('fa-eye-slash', 'fa-eye');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.replace('fa-eye', 'fa-eye-slash');
            }
        }

        const loginForm = document.querySelector('form');
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            signInWithEmailAndPassword(auth, email, password)
                .then(() => {
                    alert("🔓 تم تسجيل الدخول بنجاح! جاري الانتقال للرئيسية...");
                    window.location.href = "index.html";
                })
                .catch((error) => {
                    alert("❌ خطأ: البريد الإلكتروني أو كلمة المرور غير صحيحة!");
                });
        });
    </script>
</body>
</html>
