<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7lbsaa كورة - إنشاء حساب جديد</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body {
            background: linear-gradient(rgba(10, 17, 24, 0.75), rgba(10, 17, 24, 0.85)), url('back.jpg') no-repeat center center fixed;
            background-size: cover; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 40px 20px;
        }
        .container { width: 100%; max-width: 480px; display: flex; flex-direction: column; align-items: center; }
        .logo-section { text-align: center; margin-bottom: 25px; }
        .logo-section .main-logo { width: 120px; height: auto; margin-bottom: 10px; }
        .logo-section .ball-gif { width: 45px; height: 45px; display: block; margin: 0 auto 10px auto; }
        .logo-section h1 { color: #ffffff; font-size: 28px; font-weight: 800; }
        .logo-section h1 span { color: #4CAF50; }
        .glass-card {
            background: rgba(15, 23, 33, 0.75); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; width: 100%; padding: 35px 30px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        .card-title { color: #ffffff; font-size: 24px; font-weight: 700; margin-bottom: 8px; text-align: center; }
        .card-subtitle { color: #a0aec0; font-size: 13px; margin-bottom: 25px; text-align: center; }
        .row-fields { display: flex; gap: 15px; }
        .row-fields .input-group { flex: 1; }
        .input-group { margin-bottom: 18px; text-align: right; }
        .input-group label { display: block; color: #cbd5e0; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper input, .input-wrapper select {
            width: 100%; background: rgba(10, 15, 22, 0.6); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px; padding: 12px 14px 12px 42px; color: #ffffff; font-size: 14px; outline: none; text-align: right; appearance: none;
        }
        .input-wrapper input:focus, .input-wrapper select:focus { border-color: #4CAF50; }
        .input-icon-right { position: absolute; left: 15px; color: #4a5568; font-size: 16px; }
        .password-toggle { position: absolute; right: 15px; color: #4a5568; font-size: 14px; cursor: pointer; }
        .select-arrow { position: absolute; right: 15px; color: #4a5568; font-size: 12px; pointer-events: none; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-bottom: 22px; }
        .checkbox-group input { accent-color: #4CAF50; width: 16px; height: 16px; }
        .checkbox-group label { color: #cbd5e0; font-size: 13px; }
        .checkbox-group label span { color: #4CAF50; font-weight: 600; }
        .btn-submit {
            width: 100%; background: #4CAF50; color: #ffffff; border: none; border-radius: 8px; padding: 12px;
            font-size: 16px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3); transition: all 0.3s;
        }
        .btn-submit:hover { background: #43a047; transform: translateY(-1px); }
        .card-footer { margin-top: 25px; color: #cbd5e0; font-size: 13px; text-align: center; }
        .card-footer a { color: #4CAF50; font-weight: 700; margin-right: 5px; }
        @media (max-width: 400px) { .row-fields { flex-direction: column; gap: 0; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-section">
            <img src="7lbsaa7.png" alt="7lbsaa Logo" class="main-logo">
            <img src="football-soccer.gif" alt="Football Animated" class="ball-gif">
            <h1>7lbsaa <span>كورة</span></h1>
            <p>عيش شغف كرة القدم</p>
        </div>

        <div class="glass-card">
            <h2 class="card-title">إنشاء حساب جديد</h2>
            <p class="card-subtitle">انضم إلينا الآن وكن جزءاً من مجتمع عشاق كرة القدم</p>

            <form>
                <div class="row-fields">
                    <div class="input-group">
                        <label>الاسم الكامل</label>
                        <div class="input-wrapper">
                            <input type="text" id="regFullName" placeholder="أدخل اسمك الكامل" required>
                            <i class="fa-regular fa-user input-icon-right"></i>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>اسم المستخدم</label>
                        <div class="input-wrapper">
                            <input type="text" id="regUsername" placeholder="اختر اسم مستخدم" required>
                            <i class="fa-regular fa-user input-icon-right"></i>
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <label>البريد الإلكتروني</label>
                    <div class="input-wrapper">
                        <input type="email" id="regEmail" placeholder="أدخل بريدك الإلكتروني" required>
                        <i class="fa-regular fa-envelope input-icon-right"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label>كلمة المرور</label>
                    <div class="input-wrapper">
                        <input type="password" placeholder="أدخل كلمة المرور" id="regPass1" required>
                        <i class="fa-regular fa-eye-slash password-toggle" onclick="togglePass('regPass1', this)"></i>
                        <i class="fa-solid fa-lock input-icon-right"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label>تأكيد كلمة المرور</label>
                    <div class="input-wrapper">
                        <input type="password" placeholder="أعد إدخال كلمة المرور" id="regPass2" required>
                        <i class="fa-regular fa-eye-slash password-toggle" onclick="togglePass('regPass2', this)"></i>
                        <i class="fa-solid fa-lock input-icon-right"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label>تاريخ الميلاد</label>
                    <div class="input-wrapper">
                        <select id="regBirthYear" required>
                            <option value="" disabled selected hidden>اختر تاريخ ميلادك</option>
                            <script>
                                const currentYear = new Date().getFullYear();
                                for(let i = currentYear; i >= 1950; i--) {
                                    document.write(`<option value="${i}">${i}</option>`);
                                }
                            </script>
                        </select>
                        <i class="fa-solid fa-chevron-down select-arrow"></i>
                        <i class="fa-regular fa-calendar input-icon-right"></i>
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="termsCheck" required>
                    <label for="termsCheck">أوافق على <span>الشروط والأحكام</span> و<span>سياسة الخصوصية</span></label>
                </div>

                <button type="submit" class="btn-submit">إنشاء حساب</button>
            </form>

            <div class="card-footer">
                لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, database, createUserWithEmailAndPassword, ref, set } from "./firebase-config.js";

        window.togglePass = function(id, icon) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            }
        }

        const registerForm = document.querySelector('form');
        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const fullName = document.getElementById('regFullName').value;
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const pass1 = document.getElementById('regPass1').value;
            const pass2 = document.getElementById('regPass2').value;
            const birthYear = document.getElementById('regBirthYear').value;

            if (pass1 !== pass2) {
                alert("❌ كلمتا المرور غير متطابقتين!");
                return;
            }

            createUserWithEmailAndPassword(auth, email, pass1)
                .then((userCredential) => {
                    const user = userCredential.user;
                    // حفظ البيانات الإضافية في الداتابيز وإعطاء المستخدم 100 كوين كهدية ترحيبية
                    set(ref(database, 'users/' + user.uid), {
                        fullName: fullName,
                        username: username,
                        email: email,
                        birthYear: birthYear,
                        coins: 100,
                        score: 0,
                        role: "user"
                    })
                    .then(() => {
                        alert("🎉 تم إنشاء الحساب بنجاح! جاري تحويلك لصفحة تسجيل الدخول...");
                        window.location.href = "login.html";
                    });
                })
                .catch((error) => {
                    if (error.code === 'auth/email-already-in-use') {
                        alert("❌ هذا البريد الإلكتروني مسجل بالفعل!");
                    } else {
                        alert("❌ خطأ أثناء التسجيل: " + error.message);
                    }
                });
        });
    </script>
</body>
</html>
